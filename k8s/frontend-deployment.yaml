apiVersion: apps/v1
kind: Deployment
metadata:
  name: loggboken-frontend
  namespace: loggboken
  labels:
    app.kubernetes.io/name: loggboken
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: loggboken
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loggboken
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: REGISTRY/loggboken-frontend:TAG # bygg från frontend/Dockerfile
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
