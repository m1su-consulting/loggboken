apiVersion: apps/v1
kind: Deployment
metadata:
  name: loggboken-app
  namespace: loggboken
  labels:
    app.kubernetes.io/name: loggboken
    app.kubernetes.io/component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: loggboken
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loggboken
        app.kubernetes.io/component: app
    spec:
      containers:
        - name: app
          image: REGISTRY/loggboken-app:TAG # bygg från Dockerfile i repo-roten
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: loggboken-config
            - secretRef:
                name: loggboken-secrets
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
