# MALL — kopiera till secret.yaml, fyll i riktiga värden, och applya den filen
# istället. secret.yaml är gitignorad (se .gitignore) så riktiga hemligheter
# hamnar aldrig i repot. I en mer utbyggd miljö: ersätt med Sealed Secrets,
# External Secrets Operator eller motsvarande istället för att hantera
# secret.yaml för hand.
apiVersion: v1
kind: Secret
metadata:
  name: loggboken-secrets
  namespace: loggboken
type: Opaque
stringData:
  # Pekar mot er hanterade Postgres-instans (RDS, Cloud SQL, etc.) — inte en
  # in-cluster databas, se k8s/README.md.
  APP_DATABASE_URL: "postgresql://USER:PASSWORD@YOUR-DB-HOST:5432/environment_inventory"
  # JSON-sträng, samma format som .env lokalt — en nyckel per källsystem.
  APP_API_KEYS: '{"CHANGE-ME-rpm-key":{"client":"rpm-agent","source_types":["rpm"]},"CHANGE-ME-k8s-key":{"client":"k8s-agent","source_types":["kubernetes"]},"CHANGE-ME-admin-key":{"client":"admin","source_types":null}}'
